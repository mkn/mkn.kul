name: build

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: "Build/Test"
      run: |
        curl -fL --retry 3 --retry-delay 2 -o mkn https://github.com/mkn/mkn/releases/download/latest/mkn_nix
        chmod +x mkn
        KLOG=3 ./mkn clean build run -dtOp test,usage -a "-std=c++20 -fPIC" -W 9

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: "Build/Test"
      run: |
        curl -fL --retry 3 --retry-delay 2 -o mkn https://github.com/mkn/mkn/releases/download/latest/mkn_arm_osx
        chmod +x mkn
        KLOG=3 ./mkn clean build run -dtOp test,usage -a "-std=c++20 -fPIC" -W 9

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: "Build/Test"
      shell: cmd
      env:
        MKN_CL_PREFERRED: 1
      run: | # /bin/link interferes with cl/link.exe
        bash -c "rm /bin/link"
        bash -c "curl -Lo mkn.exe https://github.com/mkn/mkn/releases/download/latest/mkn.exe"
        bash -c 'KLOG=3 ./mkn clean build run -dtKOp test,usage -a "-EHsc -std:c++20"'
